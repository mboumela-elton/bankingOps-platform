################################################################################
# Gitea — Lightweight local Git server (v1.22 with persistent storage)
################################################################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-pvc
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.22-rootless
          ports:
            - containerPort: 3000
            - containerPort: 2222
          env:
            - name: GITEA__server__ROOT_URL
              value: "http://gitea.gitea.svc.cluster.local:3000"
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__database__DB_TYPE
              value: "sqlite3"
            - name: GITEA__database__PATH
              value: "/var/lib/gitea/data/gitea.db"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__security__SECRET_KEY
              value: "bankingops-secret-key-local"
            - name: GITEA__security__INTERNAL_TOKEN
              value: "bankingops-internal-token-local"
            - name: GITEA__actions__ENABLED
              value: "true"
            - name: GITEA__actions__DEFAULT_ACTIONS_URL
              value: "github"
          volumeMounts:
            - name: gitea-data
              mountPath: /var/lib/gitea
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitea
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: ssh
      port: 2222
      targetPort: 2222
  type: ClusterIP
