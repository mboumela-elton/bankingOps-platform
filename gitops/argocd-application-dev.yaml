apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bankingops-dev
  namespace: argocd
  labels:
    env: dev
    app: bankingops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/mboumela-elton/bankingOps-platform.git
    targetRevision: develop
    path: helm/bankingops
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: bankingops-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
