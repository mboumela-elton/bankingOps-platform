################################################################################
# kind cluster configuration
# Configure le registry local insecure dès la création du cluster
################################################################################
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry.gitea.svc.cluster.local:5000"]
      endpoint = ["http://registry.gitea.svc.cluster.local:5000"]
