################################################################################
# Banking Operations Platform — CI/CD Pipeline (GitHub Actions)
#
# Flux :
#   push develop/master
#     → tests unitaires (toutes branches)
#     → build + scan + push Docker Hub (si secrets configurés)
#     → update values-dev.yaml → ArgoCD sync (master uniquement)
################################################################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - develop-github
      - master
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'helm/bankingops/values-dev.yaml'   # évite la boucle infinie

env:
  IMAGE_NAME: mboumela-elton/bankingops-api

jobs:
  ################################################################################
  # JOB 1 — Tests unitaires (toutes branches)
  ################################################################################
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: |
          cd app
          mvn test -B

  ################################################################################
  # JOB 2 — Build, Scan, Push (uniquement si secrets Docker Hub configurés)
  ################################################################################
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    # Ne tourne que si les secrets Docker Hub sont configurés
    if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-8)
          BRANCH=$(echo ${{ github.ref_name }} | tr '/' '-')
          TAG="${BRANCH}-${SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            app/

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Push image to Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "Pushed: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"

  ################################################################################
  # JOB 3 — Update Helm values → ArgoCD sync (master uniquement)
  ################################################################################
  update-helm:
    name: Update Helm Values
    runs-on: ubuntu-latest
    needs: build-and-push
    # GitOps uniquement sur master, et seulement si le build a réussi
    if: ${{ github.ref_name == 'master' && needs.build-and-push.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update image tag in values-dev.yaml
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          IMAGE="${{ env.IMAGE_NAME }}"

          sed -i "s|repository:.*|repository: ${IMAGE}|" helm/bankingops/values-dev.yaml
          sed -i "s|tag:.*|tag: \"${TAG}\"|"             helm/bankingops/values-dev.yaml
          sed -i "s|pullPolicy:.*|pullPolicy: Always|"   helm/bankingops/values-dev.yaml

          echo "=== values-dev.yaml updated ==="
          grep -A4 "image:" helm/bankingops/values-dev.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add helm/bankingops/values-dev.yaml
          git diff --staged --quiet && echo "No changes" && exit 0

          git commit -m "ci: update image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push origin master
          echo "Pushed — ArgoCD will detect and sync automatically"
