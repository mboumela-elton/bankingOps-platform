apiVersion: v1
kind: Secret
metadata:
  name: bankingops-secret
  namespace: bankingops-dev
type: Opaque
# Values are base64 encoded
# echo -n "postgres" | base64  → cG9zdGdyZXM=
# echo -n "admin123" | base64  → YWRtaW4xMjM=
data:
  DB_USER: cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXM=
  SPRING_SECURITY_USER_NAME: YWRtaW4=
  SPRING_SECURITY_USER_PASSWORD: YWRtaW4xMjM=
