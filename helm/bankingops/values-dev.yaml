################################################################################
# Dev overrides — lightweight, fast iteration
################################################################################

api:
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "300m"
  probes:
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 5
    liveness:
      initialDelaySeconds: 90
      periodSeconds: 15
      failureThreshold: 5

hpa:
  enabled: false    # No autoscaling in dev

config:
  springProfile: dev
  logLevel: DEBUG

ingress:
  # Convention hors-prod : <api>.bankingops.hors.prod.fr
  host: transaction-api.bankingops.hors.prod.fr
  tls:
    enabled: false    # pas de TLS en dev
