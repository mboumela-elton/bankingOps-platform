################################################################################
# Dev overrides — lightweight, fast iteration
################################################################################

api:
  replicas: 2
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "300m"
  probes:
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 5
    liveness:
      initialDelaySeconds: 90
      periodSeconds: 15
      failureThreshold: 5

hpa:
  enabled: false    # No autoscaling in dev

config:
  springProfile: dev
  logLevel: DEBUG

ingress:
  host: bankingops-dev.local
