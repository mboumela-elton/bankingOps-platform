################################################################################
# Default values — used as base, overridden by values-dev.yaml or values-prod.yaml
################################################################################

# --- API ---
api:
  image:
    repository: bankingops-api
    tag: latest
    pullPolicy: Never        # "Never" for kind (local image), "Always" for Docker Hub (msel/bankingops-api)

  replicas: 2

  port: 8080

  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "768Mi"
      cpu: "500m"

  jvm:
    maxRAMPercentage: "50.0"
    initialRAMPercentage: "25.0"

  probes:
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 3

# --- HPA ---
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpu:
    targetUtilization: 70
  memory:
    targetUtilization: 80

# --- Service ---
service:
  type: ClusterIP
  port: 80

# --- Ingress ---
ingress:
  enabled: true
  className: nginx
  # Host par défaut — surchargé dans values-dev.yaml et values-prod-like.yaml
  host: bankingops.hors.prod.fr
  tls:
    enabled: false        # true en prod avec un vrai certificat
    secretName: bankingops-tls

# --- PostgreSQL ---
postgres:
  image:
    repository: postgres
    tag: "14-alpine"

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  storage: 1Gi

# --- Config (non-sensitive) ---
config:
  dbName: bankingops
  dbPort: "5432"
  springProfile: prod
  logLevel: INFO

# --- Secrets (fictitious values — never real secrets in Git) ---
secret:
  dbUser: postgres
  dbPassword: changeme
  securityUserName: admin
  securityUserPassword: changeme
