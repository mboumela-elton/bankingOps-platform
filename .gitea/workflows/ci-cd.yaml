################################################################################
# Banking Operations Platform — CI/CD Pipeline
#
# Un seul job qui tourne directement sur le runner (pas de container séparé).
# Le runner a accès au DinD via DOCKER_HOST=tcp://localhost:2375.
# Maven est installé dans le job.
################################################################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - master
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'helm/bankingops/values-dev.yaml'

env:
  REGISTRY: registry.gitea.svc.cluster.local:5000
  IMAGE_NAME: bankingops-api
  GITEA_URL: http://gitea.gitea.svc.cluster.local:3000
  GITEA_USER: msel
  DOCKER_HOST: tcp://localhost:2375
  DOCKER_API_VERSION: "1.43"

jobs:
  pipeline:
    name: CI/CD
    runs-on: ubuntu-latest

    steps:
      ##########################################################################
      # 1. Checkout
      ##########################################################################
      - name: Checkout code
        run: |
          git clone ${{ env.GITEA_URL }}/msel/bankingops-platform.git .
          git checkout ${{ github.sha }}

      ##########################################################################
      # 2. Install Java + Maven
      ##########################################################################
      - name: Install Java 17 and Maven
        run: |
          apt-get update -qq
          apt-get install -y -qq wget curl git sed

          # Install Temurin 17
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.11%2B9/OpenJDK17U-jdk_x64_linux_hotspot_17.0.11_9.tar.gz \
            -O /tmp/jdk17.tar.gz
          mkdir -p /opt/java/17
          tar -xzf /tmp/jdk17.tar.gz -C /opt/java/17 --strip-components=1
          export JAVA_HOME=/opt/java/17
          export PATH=$JAVA_HOME/bin:$PATH
          echo "JAVA_HOME=/opt/java/17" >> $GITHUB_ENV
          echo "PATH=/opt/java/17/bin:$PATH" >> $GITHUB_ENV

          # Install Maven
          wget -q https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz \
            -O /tmp/maven.tar.gz
          mkdir -p /opt/maven
          tar -xzf /tmp/maven.tar.gz -C /opt/maven --strip-components=1
          echo "PATH=/opt/maven/bin:/opt/java/17/bin:$PATH" >> $GITHUB_ENV

          java -version
          /opt/maven/bin/mvn -version

      ##########################################################################
      # 3. Tests unitaires
      ##########################################################################
      - name: Run unit tests
        run: |
          export JAVA_HOME=/opt/java/17
          export PATH=/opt/maven/bin:/opt/java/17/bin:$PATH
          cd app
          mvn test -B 2>&1 | tail -30

      ##########################################################################
      # 4. Set image tag
      ##########################################################################
      - name: Set image metadata
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-8)
          BRANCH=$(echo ${{ github.ref_name }} | tr '/' '-')
          TAG="${BRANCH}-${SHA}"
          FULL="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full=${FULL}" >> $GITHUB_OUTPUT
          echo "Image: ${FULL}"

      ##########################################################################
      # 5. Build Docker image
      ##########################################################################
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.full }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            app/

      ##########################################################################
      # 6. Scan Trivy
      ##########################################################################
      - name: Scan image with Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.50.0 2>/dev/null

          echo "=== Trivy Security Scan ==="
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --no-progress \
            ${{ steps.meta.outputs.full }} 2>&1 || true

      ##########################################################################
      # 7. Push image
      ##########################################################################
      - name: Push image to registry
        run: |
          docker push ${{ steps.meta.outputs.full }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          echo "Pushed: ${{ steps.meta.outputs.full }}"

      ##########################################################################
      # 8. Update Helm values → ArgoCD sync
      ##########################################################################
      - name: Update image tag in values-dev.yaml
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE="${{ env.IMAGE_NAME }}"

          sed -i "s|repository:.*|repository: ${REGISTRY}/${IMAGE}|" \
            helm/bankingops/values-dev.yaml
          sed -i "s|tag:.*|tag: \"${TAG}\"|" \
            helm/bankingops/values-dev.yaml
          sed -i "s|pullPolicy:.*|pullPolicy: Always|" \
            helm/bankingops/values-dev.yaml

          echo "=== Updated values-dev.yaml ==="
          grep -A5 "image:" helm/bankingops/values-dev.yaml

      - name: Commit and push updated values
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@bankingops.local"

          git add helm/bankingops/values-dev.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "ci: update image tag to ${{ steps.meta.outputs.tag }} [skip ci]"

          git remote set-url origin \
            http://${{ env.GITEA_USER }}:${{ secrets.GITEATOKEN }}@gitea.gitea.svc.cluster.local:3000/${{ env.GITEA_USER }}/bankingops-platform.git

          git push origin ${{ github.ref_name }}
          echo "Done — ArgoCD will sync automatically"
