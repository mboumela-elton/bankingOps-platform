################################################################################
# Banking Operations Platform — CI/CD Pipeline
#
# Flux :
#   commit → tests → build image → scan Trivy → push registry → update values
#   → ArgoCD détecte → sync Kubernetes
################################################################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - master
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'helm/bankingops/values-dev.yaml'  # évite la boucle infinie

env:
  REGISTRY: registry.gitea.svc.cluster.local:5000
  IMAGE_NAME: bankingops-api
  GITEA_URL: http://gitea.gitea.svc.cluster.local:3000
  GITEA_USER: msel

jobs:
  ################################################################################
  # JOB 1 — Tests unitaires
  ################################################################################
  test:
    name: Tests
    runs-on: ubuntu-latest
    container:
      image: maven:3.9-eclipse-temurin-17

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          cd app
          mvn test -B 2>&1 | tail -30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/target/surefire-reports/

  ################################################################################
  # JOB 2 — Build, Scan, Push
  ################################################################################
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_full: ${{ steps.meta.outputs.full }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-8)
          BRANCH=$(echo ${{ github.ref_name }} | tr '/' '-')
          TAG="${BRANCH}-${SHA}"
          FULL="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full=${FULL}" >> $GITHUB_OUTPUT
          echo "Image will be: ${FULL}"

      - name: Configure insecure registry
        run: |
          # Autoriser le registry local non-HTTPS
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries":["${{ env.REGISTRY }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || true
          sleep 3

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.full }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            app/

      - name: Scan image with Trivy
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.50.0 2>/dev/null

          echo "=== Trivy Security Scan ==="
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --no-progress \
            ${{ steps.meta.outputs.full }} 2>&1 || true

          echo "Scan complete"

      - name: Push image to local registry
        run: |
          docker push ${{ steps.meta.outputs.full }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          echo "Pushed: ${{ steps.meta.outputs.full }}"

  ################################################################################
  # JOB 3 — Update Helm values → déclenche ArgoCD sync
  ################################################################################
  update-helm:
    name: Update Helm Values
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITEATOKEN }}

      - name: Update image tag in values-dev.yaml
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE="${{ env.IMAGE_NAME }}"

          echo "Updating image to: ${REGISTRY}/${IMAGE}:${TAG}"

          # Mettre à jour repository et tag
          sed -i "s|repository:.*|repository: ${REGISTRY}/${IMAGE}|" \
            helm/bankingops/values-dev.yaml
          sed -i "s|tag:.*|tag: \"${TAG}\"|" \
            helm/bankingops/values-dev.yaml
          # Changer pullPolicy pour utiliser l'image du registry
          sed -i "s|pullPolicy:.*|pullPolicy: Always|" \
            helm/bankingops/values-dev.yaml

          echo "=== Updated values-dev.yaml ==="
          grep -A5 "image:" helm/bankingops/values-dev.yaml

      - name: Commit and push updated values
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@bankingops.local"

          git add helm/bankingops/values-dev.yaml
          git diff --staged --quiet && echo "No changes" && exit 0

          git commit -m "ci: update image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"

          # Push vers Gitea via HTTP avec token
          git remote set-url origin \
            http://${{ env.GITEA_USER }}:${{ secrets.GITEATOKEN }}@gitea.gitea.svc.cluster.local:3000/${{ env.GITEA_USER }}/bankingops-platform.git

          git push origin ${{ github.ref_name }}
          echo "Pushed — ArgoCD will detect and sync automatically"
